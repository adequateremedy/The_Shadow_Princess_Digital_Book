<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Shadow Princess</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Georgia, serif;
}

#book-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#book-page {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    z-index: 1;
}

.page {
    position: absolute;
    top: 12%;
    height: 76%;
    overflow: hidden;
    box-sizing: border-box;
    padding: 22px 26px;
    z-index: 5;
}

#pageA {
    width: 20.6%;
    left: 28.2%;
}

#pageB {
    width: 19.2%;
    right: 28.8%;
}

.chapter-number {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 4px;
}

.chapter-title {
    text-align: center;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 18px;
}

.chapter-text {
    font-size: 12px;
    line-height: 1.75;
    text-align: justify;
    white-space: pre-wrap;
    word-break: normal;
    overflow-wrap: break-word;
    hyphens: auto;
}

.chapter-divider {
    display: block;
    width: 100%;
    border: none;
    border-top: 1px solid rgba(0,0,0,0.6);
    margin: 14px 0;
}

.navButton {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    font-size: 26px;
    cursor: pointer;
    z-index: 9999;
}

#btnPrev {
    left: 18px;
}

#btnNext {
    right: 18px;
}

</style>

</head>

<body>

<div id="book-stage">

    <img id="book-page" src="images/Next Page.png" alt="Book">

    <div id="pageA" class="page"></div>
    <div id="pageB" class="page"></div>

    <button id="btnPrev" class="navButton">◀</button>
    <button id="btnNext" class="navButton">▶</button>

</div>

<script src="book/loader.js"></script>
<script src="book/paginator.js"></script>
<script src="book/renderer.js"></script>
<script src="book/engine.js"></script>

</body>
</html>
