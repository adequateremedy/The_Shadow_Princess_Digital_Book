<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>The Shadow Princess</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: serif;
}

#book-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#book-page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.page {
    position: absolute;
    top: 16%;
    height: 70%;
    box-sizing: border-box;
    overflow: hidden;
    padding: 10px;
}

/* ---------- LEFT PAGE (Side A) ---------- */
/* Wider ONLY toward the outside edge */

#pageA {
    width: 17%;
    left: 26%;
}

/* ---------- RIGHT PAGE (Side B) ---------- */

#pageB {
    width: 21%;
    right: 20%;
}

/* ---------- TEXT ---------- */

.chapter-number {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    display: block;
}

.chapter-title {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    display: block;
}

.chapter-text {
    font-size: 12px;
    line-height: 1.6;
    text-align: left;
}

/* ---------- NAVIGATION ---------- */

.navButton {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    font-size: 26px;
    cursor: pointer;
    z-index: 9999;
}

#btnPrev {
    left: 18px;
}

#btnNext {
    right: 18px;
}

</style>

</head>

<body>

<div id="book-stage">

    <img id="book-page" src="images/Next Page.png" alt="Book Page">

    <div id="pageA" class="page"></div>
    <div id="pageB" class="page"></div>

    <button id="btnPrev" class="navButton">◀</button>
    <button id="btnNext" class="navButton">▶</button>

</div>

<script src="book/loader.js"></script>
<script src="book/paginator.js"></script>
<script src="book/renderer.js"></script>
<script src="book/engine.js"></script>

</body>
</html>
