<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- =====================================================
         BACKGROUND ATMOSPHERE
    ====================================================== -->

    <video id="background-video"
           playsinline
           preload="auto"
           loop>

        <source src="assets/background.webm"
                type="video/webm">

    </video>



    <!-- =====================================================
         BOOK
    ====================================================== -->

    <div id="book">


        <!-- ==============================================
             CLOSED BOOK (SPINE)
        =============================================== -->

        <img
            id="spine"
            src="assets/spine.png"
            alt="Book Spine">



        <!-- ==============================================
             HARD COVER
        =============================================== -->

        <div id="cover-container">

            <img
                id="front-cover"
                src="assets/front-cover.png"
                alt="Front Cover">

        </div>



        <!-- ==============================================
             OPEN BOOK
        =============================================== -->

        <div id="book-interior">



            <!-- ==========================================
                 LEFT SIDE
            =========================================== -->

            <div id="left-side">

                <!-- Inside Front Cover -->

                <div id="inside-front-cover"></div>

                <!-- Read Pages -->

                <div id="left-page-stack"></div>

            </div>





            <!-- ==========================================
                 BOOK GUTTER
            =========================================== -->

            <div id="book-spine-shadow"></div>





            <!-- ==========================================
                 RIGHT SIDE
            =========================================== -->

            <div id="right-side">

                <!-- Inside Back Cover -->

                <div id="inside-back-cover"></div>

                <!-- Remaining Pages -->

                <div id="right-page-stack"></div>

            </div>





            <!-- ==========================================
                 ACTIVE PAGE TURN LAYER
            =========================================== -->

            <div id="page-turn-layer"></div>



        </div>



    </div>



    <script src="js/main.js"></script>

</body>

</html>
