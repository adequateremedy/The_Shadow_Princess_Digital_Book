<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Shadow Princess</title>

<style>
/* =========================
   GLOBAL
========================= */
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: serif;
}

/* =========================
   BOOK STAGE
========================= */
#book-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* STATIC PAGE FRAME */
#book-page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* =========================
   PAGE ZONES
========================= */
.page {
    position: absolute;
    top: 16%;
    height: 70%;
    box-sizing: border-box;
    overflow: hidden;
    padding: 10px;
}

/* LEFT */
#pageA {
    width: 21%;
    left: 28%;
}

/* RIGHT */
#pageB {
    width: 19%;
    right: 30%;
}

/* =========================
   TYPOGRAPHY
========================= */
.chapter-number {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    display: block;
}

.chapter-title {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    display: block;
}

.chapter-text {
    font-size: 12px;
    line-height: 1.6;
    text-align: left;
    white-space: normal;
}
</style>
</head>

<body>

<div id="book-stage">

    <!-- STATIC IMAGE FRAME -->
    <img id="book-page" src="images/Next Page.png" alt="Book Page">

    <!-- PAGES -->
    <div id="pageA" class="page"></div>
    <div id="pageB" class="page"></div>

</div>

<!-- =========================
     ENGINE LOAD (FULLY INCLUDED)
========================= -->
<script src="book/loader.js"></script>
<script src="book/paginator.js"></script>
<script src="book/renderer.js"></script>
<script src="book/engine.js"></script>

</body>
</html>
