<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Shadow Princess</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


    <!-- Background Bedroom Video -->
    <video
        id="background-video"
        autoplay
        loop
        muted
        playsinline>

        <source
            src="assets/background.webm"
            type="video/webm">

    </video>



    <!-- Main Book -->
    <div id="book">


        <!-- Spine Screen -->
        <img
            id="spine"
            src="assets/spine.png"
            alt="Book Spine">



        <!-- Front Cover -->
        <img
            id="front-cover"
            src="assets/front-cover.png"
            alt="Front Cover">



        <!-- Inside Book Area -->
        <div id="pages">

            <!-- Pages will be created by JavaScript -->

        </div>


    </div>



    <script src="js/main.js"></script>


</body>

</html>
